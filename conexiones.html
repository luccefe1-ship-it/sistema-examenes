<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Audios - Plataforma Exámenes</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        body {
            overflow-y: auto;
            transition: background 1s ease;
            background:
                radial-gradient(ellipse at top, rgba(135,206,250,0.3) 0%, rgba(173,216,230,0.4) 50%, rgba(176,196,222,0.5) 100%),
                radial-gradient(circle at 20% 80%, rgba(200,230,255,0.15) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(200,230,255,0.15) 0%, transparent 60%);
        }

        .audios-container {
            max-width: 900px;
            margin: 100px auto 120px;
            padding: 20px;
        }

        .audios-header { text-align: center; margin-bottom: 30px; }
        .audios-header h1 { font-size: 2rem; color: #1e293b; margin-bottom: 8px; }
        .audios-header p { color: #64748b; font-size: 1rem; }

        .upload-zone {
            background: white;
            border: 2px dashed #c7d2fe;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 24px;
            transition: all 0.2s ease;
        }
        .upload-zone.dragover { border-color: #6366f1; background: #eef2ff; }
        .upload-zone p { color: #64748b; margin: 8px 0 16px; font-size: 0.95rem; }

        .btn-subir {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none;
            padding: 12px 28px; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
        }
        .btn-subir:hover { opacity: 0.92; }
        .btn-subir:disabled { opacity: 0.5; cursor: default; }

        #estadoSubida { margin-top: 14px; font-size: 0.9rem; color: #6366f1; font-weight: 600; }

        .audios-lista { display: flex; flex-direction: column; gap: 8px; }

        .audio-franja {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: white;
            border-radius: 10px; border-left: 5px solid #6366f1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .audio-franja.reproduciendo { border-left-color: #10b981; background: #f0fdf4; }

        .audio-franja-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .audio-franja-nombre {
            font-weight: 600; font-size: 0.98rem; color: #1e293b;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .audio-franja-acciones { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-escuchar {
            background: #6366f1; color: white; border: none;
            padding: 8px 16px; border-radius: 8px;
            font-size: 0.88rem; font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .btn-escuchar:hover { background: #4f46e5; }

        .btn-borrar {
            background: #fee2e2; color: #dc2626; border: none;
            width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 1rem;
        }
        .btn-borrar:hover { background: #fecaca; }

        .cargando-audios { text-align: center; padding: 60px 20px; color: #64748b; }
        .cargando-audios .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e2e8f0; border-top: 4px solid #6366f1;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .reproductor {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
            padding: 14px 24px; display: none; align-items: center; gap: 16px; z-index: 1000;
        }
        .reproductor.activo { display: flex; }
        .reproductor-info { flex: 1; min-width: 0; }
        .reproductor-titulo {
            font-weight: 600; color: #1e293b; font-size: 0.95rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .reproductor-barra {
            height: 6px; background: #e2e8f0; border-radius: 3px;
            margin-top: 6px; overflow: hidden;
        }
        .reproductor-progreso {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.3s ease;
        }
        .reproductor-controles { display: flex; gap: 8px; }
        .reproductor-btn {
            background: #6366f1; color: white; border: none;
            width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.1rem;
        }
        .reproductor-btn:hover { background: #4f46e5; }
        .reproductor-btn.stop { background: #ef4444; }
        .reproductor-btn.stop:hover { background: #dc2626; }

        @media (max-width: 768px) {
            .audios-container { margin-top: 80px; padding: 12px; }
            .reproductor { padding: 12px 14px; gap: 10px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1>Plataforma Exámenes de Justicia</h1>
            <div class="nav-actions">
                <span id="userName">Cargando...</span>
                <button id="backBtn" style="padding:8px 16px;background:#4a5568;color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;">← Volver</button>
                <button id="logoutBtn" style="padding:8px 16px;background:#e53e3e;color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="audios-container">
        <div class="audios-header">
            <h1>🎧 Mis Audios</h1>
            <p>Sube documentos Word y escúchalos en voz alta</p>
        </div>

        <div class="upload-zone" id="uploadZone">
            <div style="font-size:2.5rem;">📄</div>
            <p>Arrastra aquí tus archivos .docx o haz clic para seleccionarlos</p>
            <input type="file" id="inputArchivos" accept=".docx" multiple style="display:none;">
            <button class="btn-subir" id="btnSeleccionar">Seleccionar archivos</button>
            <div id="estadoSubida"></div>
        </div>

        <div id="listaAudios" class="audios-lista">
            <div class="cargando-audios">
                <div class="spinner"></div>
                <p>Cargando audios...</p>
            </div>
        </div>
    </div>

    <div class="reproductor" id="reproductor">
        <div class="reproductor-info">
            <div class="reproductor-titulo" id="reproductorTitulo"></div>
            <div class="reproductor-barra"><div class="reproductor-progreso" id="reproductorProgreso"></div></div>
        </div>
        <div class="reproductor-controles">
            <button class="reproductor-btn" id="btnPausaReanudar">⏸</button>
            <button class="reproductor-btn stop" id="btnDetener">⏹</button>
        </div>
    </div>

    <script type="module" src="js/conexiones.js"></script>
</body>
</html>
