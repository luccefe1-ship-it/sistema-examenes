<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas de Memoria - Plataforma Exámenes</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            overflow-y: auto;
            transition: background 1s ease;
            background: 
                radial-gradient(ellipse at top, rgba(135,206,250,0.3) 0%, rgba(173,216,230,0.4) 50%, rgba(176,196,222,0.5) 100%),
                radial-gradient(circle at 20% 80%, rgba(200,230,255,0.15) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(200,230,255,0.15) 0%, transparent 60%);
        }

        .tarjetas-memoria-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            margin-top: 100px;
        }

        .tarjetas-memoria-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .tarjetas-memoria-header h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .tarjetas-memoria-header p {
            color: #64748b;
            font-size: 1rem;
        }

        .temas-lista {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tema-franja {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: white;
            border-radius: 10px;
            border-left: 5px solid #6366f1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tema-franja:hover {
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.15);
            border-left-color: #4f46e5;
        }

        .tema-franja-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tema-franja-nombre {
            font-weight: 600;
            font-size: 1rem;
            color: #1e293b;
        }

        .tema-franja-count {
            font-size: 0.85rem;
            color: #6366f1;
            font-weight: 600;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .tema-franja-arrow {
            color: #94a3b8;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .tema-franja:hover .tema-franja-arrow {
            transform: translateX(4px);
            color: #6366f1;
        }

        .tema-franja.sin-tarjetas {
            opacity: 0.5;
            cursor: default;
            border-left-color: #cbd5e1;
        }

        .tema-franja.sin-tarjetas:hover {
            transform: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .cargando-temas {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .cargando-temas .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ====== MODO CINE / PRESENTACIÓN ====== */
        .cine-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .cine-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(0,0,0,0.5);
            z-index: 2;
        }

        .cine-titulo {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .cine-contador {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .cine-cerrar {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cine-cerrar:hover {
            background: rgba(255,255,255,0.3);
        }

        .cine-imagen-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 80px 80px 60px;
        }

        .cine-imagen {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            user-select: none;
        }

        .cine-pregunta-texto {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 80%;
            background: rgba(0,0,0,0.7);
            color: #cbd5e1;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .cine-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 2.5rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cine-nav:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-50%) scale(1.1);
        }

        .cine-nav.prev { left: 16px; }
        .cine-nav.next { right: 16px; }
        .cine-nav:disabled { opacity: 0.2; cursor: default; }
        .cine-nav:disabled:hover { background: rgba(255,255,255,0.1); transform: translateY(-50%); }

        .cine-dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            max-width: 80%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cine-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.2s;
        }

        .cine-dot.active {
            background: #6366f1;
            transform: scale(1.3);
        }

        @media (max-width: 768px) {
            .tarjetas-memoria-container { margin-top: 80px; padding: 12px; }
            .tema-franja { padding: 12px 16px; }
            .cine-imagen-container { padding: 70px 16px 50px; }
            .cine-nav { width: 44px; height: 44px; font-size: 1.8rem; }
            .cine-pregunta-texto { max-width: 90%; font-size: 0.8rem; bottom: 50px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1>Plataforma Exámenes de Justicia</h1>
            <div class="nav-actions">
                <span id="userName">Cargando...</span>
                <button id="backBtn">← Volver</button>
                <button id="logoutBtn">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="tarjetas-memoria-container">
        <div class="tarjetas-memoria-header">
            <h1>🃏 Tarjetas de Memoria</h1>
            <p>Selecciona un tema para ver tus tarjetas visuales</p>
        </div>

        <div id="listaTemasTarjetas" class="temas-lista">
            <div class="cargando-temas">
                <div class="spinner"></div>
                <p>Cargando temas...</p>
            </div>
        </div>
    </div>

    <script type="module" src="conexiones.js"></script>
</body>
</html>
